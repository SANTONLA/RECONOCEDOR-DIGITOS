<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reconocedor de Dígitos</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
        font-family: 'Courier New', monospace;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        color: #fff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        overflow: hidden;
        position: relative;
    }
    h1 {
        font-size:3em;
        margin-bottom:0.5em;
        color:#a0e9fd;
        z-index:2;
        position:relative;
    }
    p {
        font-size:1.2em;
        margin-bottom:2em;
        max-width:600px;
        color:#cdeffd;
        z-index:2;
        position:relative;
    }
    .btn {
        padding:15px 30px;
        font-size:1.2em;
        font-weight:bold;
        color:#fff;
        background: linear-gradient(90deg,#00c6ff,#0072ff);
        border:none;
        border-radius:50px;
        cursor:pointer;
        transition: all 0.3s ease;
        text-decoration:none;
        display:inline-block;
        z-index:2;
        position:relative;
    }
    .btn:hover {
        transform:scale(1.05);
        background: linear-gradient(90deg,#00ff95,#00c9ff);
    }
    footer {
        position:absolute;
        bottom:20px;
        font-size:0.9em;
        color:#b0e0ff;
        z-index:2;
    }
    canvas#matrix {
        position: fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        z-index:1;
        pointer-events:none;
    }
</style>
</head>
<body>

<h1>Reconocedor de Dígitos</h1>
<p>¡Bienvenido! Prueba nuestra aplicación de reconocimiento de dígitos entrenada con MNIST y ResNet18. Haz clic en el botón para abrir la app en Hugging Face.</p>
<a href="https://huggingface.co/spaces/Santonla/mnist" target="_blank" class="btn">Abrir App</a>
<footer>Proyecto en GitHub | &copy; 2026</footer>

<canvas id="matrix"></canvas>

<script>
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const fontSize = 18;
let columns = Math.floor(canvas.width / fontSize);
let drops = [];
let speedMultiplier = 1;

// Inicializar drops con profundidad y velocidad aleatoria
for (let i = 0; i < columns; i++) {
    drops[i] = {
        y: Math.random() * canvas.height / fontSize,
        speed: Math.random() * 2 + 1,
        size: Math.random() * 18 + 12,
        opacity: Math.random() * 0.5 + 0.5
    };
}

// Interactividad con cursor
window.addEventListener('mousemove', (e) => {
    speedMultiplier = 1 + (e.clientX / window.innerWidth) * 2;
});

function draw() {
    ctx.fillStyle = 'rgba(30,60,114,0.15)';
    ctx.fillRect(0,0,canvas.width,canvas.height);

    for (let i = 0; i < drops.length; i++) {
        ctx.fillStyle = `rgba(0,255,149,${drops[i].opacity})`;
        ctx.font = drops[i].size + "px monospace";
        const text = Math.floor(Math.random() * 10);
        ctx.fillText(text, i * fontSize, drops[i].y * fontSize);

        drops[i].y += drops[i].speed * speedMultiplier;

        if (drops[i].y * fontSize > canvas.height && Math.random() > 0.975) {
            drops[i].y = 0;
            drops[i].speed = Math.random() * 2 + 1;
            drops[i].size = Math.random() * 18 + 12;
            drops[i].opacity = Math.random() * 0.5 + 0.5;
        }
    }
}

setInterval(draw, 50);
</script>

</body>
</html>
