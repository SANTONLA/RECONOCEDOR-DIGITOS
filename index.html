<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reconocedor de Dígitos</title>
<style>
    /* ==========================
       RESET Y FUENTES
    ========================== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: 'Courier New', monospace;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        color: #fff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        overflow: hidden;
        position: relative;
    }

    h1 {
        font-size: 3em;
        margin-bottom: 0.5em;
        color: #a0e9fd;
        z-index: 2;
        position: relative;
    }

    p {
        font-size: 1.2em;
        margin-bottom: 2em;
        max-width: 600px;
        color: #cdeffd;
        z-index: 2;
        position: relative;
    }

    .btn {
        padding: 15px 30px;
        font-size: 1.2em;
        font-weight: bold;
        color: #fff;
        background: linear-gradient(90deg, #00c6ff, #0072ff);
        border: none;
        border-radius: 50px;
        cursor: pointer;
        transition: all 0.3s ease;
        text-decoration: none;
        display: inline-block;
        z-index: 2;
        position: relative;
    }

    .btn:hover {
        transform: scale(1.05);
        background: linear-gradient(90deg, #00ff95, #00c9ff);
    }

    footer {
        position: absolute;
        bottom: 20px;
        font-size: 0.9em;
        color: #b0e0ff;
        z-index: 2;
    }

    /* ==========================
       MATRIX BACKGROUND
    ========================== */
    canvas#matrix {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
    }
</style>
</head>
<body>

<h1>Reconocedor de Dígitos</h1>
<p>¡Bienvenido! Prueba nuestra aplicación de reconocimiento de dígitos entrenada con MNIST y ResNet18. Haz clic en el botón para abrir la app en Hugging Face.</p>
<a href="https://huggingface.co/spaces/Santonla/mnist" target="_blank" class="btn">Abrir App</a>
<footer>Proyecto en GitHub | &copy; 2026</footer>

<!-- Canvas para efecto Matrix -->
<canvas id="matrix"></canvas>

<script>
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');

    // Ajustar tamaño del canvas
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const fontSize = 20;
    const columns = Math.floor(canvas.width / fontSize);

    // Posición y velocidad de cada columna
    const drops = Array(columns).fill(0);

    function draw() {
        // Fondo semi-transparente para efecto “trazo”
        ctx.fillStyle = 'rgba(30, 60, 114, 0.2)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#00ff95'; // color dígitos verdes
        ctx.font = fontSize + "px monospace";

        for (let i = 0; i < drops.length; i++) {
            const text = Math.floor(Math.random() * 10); // dígito aleatorio
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);

            // Reiniciar cuando llega al final de la pantalla
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                drops[i] = 0;
            }
            drops[i]++;
        }
    }

    setInterval(draw, 50);

    // Ajustar canvas al redimensionar ventana
    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });
</script>

</body>
</html>
